name: Build Packages
on:
  workflow_call:

jobs:
  pack-windows-dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Job Environment
        uses: ./.github/actions/job-setup
        with:
          update-dotnet: true
      - name: Compute PKG_VERSION from Git version
        id: compute_version
        shell: pwsh
        run: |
          $pkgVersion = (nbgv get-version -v NuGetPackageVersion).Trim()
          # Remove trailing commit hash suffix like -gabcdef0 if present
          $pkgVersionNoHash = ($pkgVersion -replace '-g[0-9a-f]+$','')
          "pkg=$pkgVersionNoHash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Download Rust Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: rust-windows-*
          merge-multiple: true
      - name: Arrange Rust Artifacts
        run: |
          mkdir -p target/release
          # Move Windows executables to expected location
          find artifacts -name "*.exe" -exec cp {} target/release/ \;
          # Move Windows libraries for packaging
          find artifacts -name "*.dll" -exec cp {} target/release/ \;
          find artifacts -name "*.lib" -exec cp {} target/release/ \;
          ls -la target/release/
      - name: Build .NET
        run: |
          dotnet build -c Release /p:PackRustAssets=true /p:ContinuousIntegrationBuild=true \
            /p:Version=${{ steps.compute_version.outputs.pkg }} /p:PackageVersion=${{ steps.compute_version.outputs.pkg }}
      - name: List built packages
        run: |
          echo "Listing .nupkg files under build/Release:"
          ls -al build/Release || true
          echo
          echo "Found packages:"
          ls -1 build/Release/*nupkg || true
      - name: Validate expected BloomBooks packages exist
        shell: bash
        run: |
          set -u
          VERSION='${{ steps.compute_version.outputs.pkg }}'
          MAIN="build/Release/BloomBooks.Velopack.${VERSION}.nupkg"
          CLI="build/Release/BloomBooks.Velopack.Cli.${VERSION}.nupkg"
          echo "Expected main package: $MAIN"
          echo "Expected CLI package : $CLI"
          missing=0
          if [ -f "$MAIN" ]; then
            echo "✅ Found: $MAIN"
          else
            echo "❌ Missing required package: $MAIN"
            missing=1
          fi
          if [ -f "$CLI" ]; then
            echo "✅ Found: $CLI"
          else
            echo "❌ Missing required package: $CLI"
            missing=1
          fi
          echo
          echo "Other packages present:"
          ls -1 build/Release/*.nupkg 2>/dev/null || true
          if [ "$missing" -ne 0 ]; then
            echo "One or more required packages are missing. Failing the job."
            exit 1
          fi
      - name: Write Version File
        run: echo "${{ steps.compute_version.outputs.pkg }}" > version.txt
      - name: Upload version file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-version
          path: version.txt
      - name: Upload Package Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: build/Release/*nupkg
