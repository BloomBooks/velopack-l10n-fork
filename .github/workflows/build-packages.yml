name: Build Packages
on:
  workflow_call:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Download Python Artifacts
        uses: actions/download-artifact@v4
        with:
          path: pythondl
          pattern: wheels-*
          merge-multiple: true
      - name: Upload lib-python package
        uses: actions/upload-artifact@v4
        with:
          name: lib-python
          path: pythondl

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Job Environment
        uses: ./.github/actions/job-setup
        with:
          update-dotnet: true
      - name: Compute PKG_VERSION from run number
        id: compute_version
        shell: pwsh
        run: |
          $fourPart = (nbgv get-version -v Version).Trim()
          $base = $fourPart.Split('-')[0]
          $parts = $base.Split('.')
          $major = if ($parts.Length -ge 1) { $parts[0] } else { '0' }
          $minor = if ($parts.Length -ge 2) { $parts[1] } else { '0' }
          $patch = if ($parts.Length -ge 3) { $parts[2] } else { '0' }
          $build = $env:GITHUB_RUN_NUMBER
          if ([string]::IsNullOrEmpty($build)) { $build = "0" }
          $pkgVersion = "$major.$minor.$patch.$build"
          "pkg=$pkgVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - name: Download Rust Artifacts
        uses: actions/download-artifact@v4
        with:
          path: target/release
          pattern: rust-*
          merge-multiple: true
      - name: Build .NET
        run:
          dotnet build -c Release /p:PackRustAssets=true /p:ContinuousIntegrationBuild=true \
          /p:Version=${{ steps.compute_version.outputs.pkg }} /p:PackageVersion=${{ steps.compute_version.outputs.pkg }}
      - name: Build lib-nodejs
        working-directory: src/lib-nodejs
        run: |
          npm install
          npm run build
      - name: Write Version File
        run: echo "${{ steps.compute_version.outputs.pkg }}" > version.txt
      - name: Upload version file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-version
          path: version.txt
      - name: Upload Package Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: build/Release/*nupkg
      - name: Rearrange Artifacts
        run: |
          mkdir src/lib-nodejs/lib/native
          mv target/release/*.node src/lib-nodejs/lib/native/

          mkdir lib-c
          mkdir lib-c/lib
          mkdir lib-c/lib-static
          mkdir lib-c/include

          mv target/release/*.so lib-c/lib/
          mv target/release/*.dylib lib-c/lib/
          mv target/release/*.dll lib-c/lib/
          mv target/release/*.dll.lib lib-c/lib/
          mv target/release/*.a lib-c/lib-static/
          mv target/release/*.lib lib-c/lib-static/

          cp src/lib-cpp/include/* lib-c/include/

          mkdir bin-core
          mv target/release/* bin-core/
      - name: Upload Core Bins
        uses: actions/upload-artifact@v4
        with:
          name: bin-core
          path: bin-core/*
      - name: Upload lib-c
        uses: actions/upload-artifact@v4
        with:
          name: lib-c
          path: lib-c/*
      - name: Pack lib-nodejs
        working-directory: src/lib-nodejs
        run: npm pack
      - name: Pack lib-rust
        run: cargo package -p velopack --allow-dirty
      - name: Upload lib-nodejs package
        uses: actions/upload-artifact@v4
        with:
          name: lib-nodejs
          path: src/lib-nodejs/velopack-*.tgz
      - name: Upload lib-rust package
        uses: actions/upload-artifact@v4
        with:
          name: lib-rust
          path: target/package/velopack-*.crate
